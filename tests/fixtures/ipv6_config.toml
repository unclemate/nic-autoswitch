# IPv6 双栈配置 — 用于 IPv6 路由测试
[global]
monitor_interval = 5
log_level = "info"
dry_run = false
table_id_start = 100

[interfaces.nic0]
interface_type = "lan"
match_by = { name = "nic0" }
priority = 10

[interfaces.nic1]
interface_type = "wlan"
match_by = { name = "nic1" }
priority = 20

[wifi_profiles."CorpWiFi"]
interface = "nic1"

[[wifi_profiles."CorpWiFi".rules]]
name = "corp-ipv6"
match_on = { cidr = "fd00::/64" }
route_via = { interface = "nic0" }
priority = 100

[[routing.default_rules]]
name = "default-ipv4"
match_on = { cidr = "0.0.0.0/0" }
route_via = { interface = "nic1" }
priority = 10000

[[routing.default_rules]]
name = "default-ipv6"
match_on = { cidr = "::/0" }
route_via = { interface = "nic1" }
priority = 10001
